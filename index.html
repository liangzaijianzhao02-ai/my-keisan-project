<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>試薬計算アプリ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6f9;--white:#fff;--border:#e2e6ec;--border-mid:#cdd3dc;
  --blue:#1a6fc4;--blue-light:#e8f2fb;--blue-mid:#b5d0f0;
  --green:#1a7a50;--green-light:#e8f5ef;
  --orange:#b85c00;--orange-light:#fff4e6;
  --red:#b01c2e;--red-light:#fdf0f1;
  --purple:#5b3fa0;--purple-light:#f0ecfb;
  --teal:#0e7490;--teal-light:#e0f5f9;
  --text:#18212e;--text-mid:#4a5568;--text-dim:#8a96a6;
  --mono:'IBM Plex Mono',monospace;--sans:'Noto Sans JP',sans-serif;
  --radius:12px;--shadow:0 1px 4px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
.wrap{max-width:700px;margin:0 auto;padding:16px 12px 60px}

/* Header */
.hdr{display:flex;align-items:center;gap:10px;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:16px}
.hdr-icon{width:38px;height:38px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.hdr-title{font-size:17px;font-weight:700}
.hdr-sub{font-size:11px;color:var(--text-dim);margin-top:1px}
.offline-badge{margin-left:auto;background:var(--green-light);color:var(--green);border:1px solid #b0d8c0;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;white-space:nowrap}

/* Tabs */
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:3px;margin-bottom:14px;box-shadow:var(--shadow)}
.tab{padding:7px 4px;border:none;background:none;color:var(--text-dim);font-family:var(--sans);font-size:12px;font-weight:500;border-radius:8px;cursor:pointer;transition:all .15s;text-align:center;line-height:1.3}
.tab.active{background:var(--blue-light);color:var(--blue);font-weight:700}
.tab:not(.active):hover{background:var(--bg);color:var(--text)}

/* Card */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:var(--text-mid);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}

/* ─── Periodic Table Filter ─── */
.element-filter{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
.ef-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.ef-title{font-size:11px;font-weight:700;color:var(--text-mid);text-transform:uppercase;letter-spacing:.5px}
.ef-selected{font-size:12px;color:var(--blue);font-family:var(--mono);font-weight:600;flex:1;margin-left:10px}
.ef-clear{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:11px;color:var(--text-dim);cursor:pointer;font-family:var(--sans);transition:all .15s}
.ef-clear:hover{background:var(--red-light);color:var(--red);border-color:#f0b0b8}

/* Periodic table grid */
.ptable{display:grid;grid-template-columns:repeat(18,1fr);gap:2px;margin-bottom:8px;overflow-x:auto}
.el-btn{
  aspect-ratio:1;border:1px solid var(--border);border-radius:4px;
  background:var(--bg);font-size:9px;font-weight:600;color:var(--text-mid);
  cursor:pointer;transition:all .15s;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:1px;line-height:1.1;
  min-width:0;
}
.el-btn:hover{background:var(--blue-light);border-color:var(--blue-mid);color:var(--blue)}
.el-btn.selected{background:var(--blue);border-color:var(--blue);color:#fff}
.el-btn.has-reagent{border-color:var(--blue-mid);background:#f0f7ff}
.el-btn.has-reagent.selected{background:var(--blue);color:#fff}
.el-btn.empty-cell{border:none;background:none;cursor:default;pointer-events:none}
.el-num{font-size:7px;font-weight:400;opacity:.7}

/* Category colors */
.el-btn.cat-alkali{background:#fff0f0;border-color:#f0c0c0}
.el-btn.cat-alkali-earth{background:#fff8e8;border-color:#f0d890}
.el-btn.cat-transition{background:#f0f4ff;border-color:#c0ccf0}
.el-btn.cat-post-trans{background:#f4f0ff;border-color:#c8b8f0}
.el-btn.cat-metalloid{background:#f0fff4;border-color:#a0d8b0}
.el-btn.cat-nonmetal{background:#e8f8f0;border-color:#90d0b0}
.el-btn.cat-halogen{background:#fff0e8;border-color:#f0b080}
.el-btn.cat-noble{background:#f8f0ff;border-color:#c0a0e0}
.el-btn.cat-lanthanide{background:#fff8f0;border-color:#e8c0a0}
.el-btn.cat-actinide{background:#f0f0f0;border-color:#c0c0c0}
.el-btn.cat-alkali.selected,.el-btn.cat-alkali-earth.selected,.el-btn.cat-transition.selected,
.el-btn.cat-post-trans.selected,.el-btn.cat-metalloid.selected,.el-btn.cat-nonmetal.selected,
.el-btn.cat-halogen.selected,.el-btn.cat-noble.selected,.el-btn.cat-lanthanide.selected,
.el-btn.cat-actinide.selected{background:var(--blue);border-color:var(--blue);color:#fff}

/* Legend */
.ef-legend{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.ef-legend-item{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text-dim)}
.ef-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* ─── Reagent Selector ─── */
.reagent-select-area{margin-bottom:12px}
.reagent-count{font-size:11px;color:var(--text-dim);margin-bottom:5px}
.reagent-count span{color:var(--blue);font-weight:600}
select.reagent-main{width:100%;background:var(--bg);border:1.5px solid var(--border-mid);border-radius:8px;padding:10px 12px;font-family:var(--sans);font-size:14px;color:var(--text);outline:none;transition:border-color .2s;cursor:pointer}
select.reagent-main:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,111,196,.1);background:var(--white)}
.reagent-info-box{margin-top:6px;padding:8px 12px;background:var(--blue-light);border:1px solid var(--blue-mid);border-radius:8px;font-size:11px;color:var(--blue);font-family:var(--mono);line-height:1.7;display:none}

/* ─── Form fields ─── */
.field-row{display:grid;gap:8px;margin-bottom:10px}
.field-row.col2{grid-template-columns:1fr 1fr}
.field-row.col2u{grid-template-columns:2fr 1fr}
.field-row.col3{grid-template-columns:1fr 1fr 1fr}
label{font-size:11px;font-weight:600;color:var(--text-mid);display:block;margin-bottom:4px;letter-spacing:.3px}
label .opt{font-weight:400;color:var(--text-dim);font-size:10px;margin-left:3px}
input[type=number],select.unit-sel{width:100%;background:var(--bg);border:1.5px solid var(--border-mid);border-radius:8px;padding:9px 11px;font-family:var(--mono);font-size:14px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
input[type=number]:focus,select.unit-sel:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,111,196,.1);background:var(--white)}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
select.unit-sel{cursor:pointer}

/* ─── Results ─── */
.result-card{background:var(--green-light);border:1px solid #b0d8c0;border-radius:var(--radius);padding:14px;animation:fadeIn .25s ease}
.result-card.ph-card{background:var(--purple-light);border-color:#c8b8f0}
.result-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.result-box{background:var(--white);border:1px solid #b0d8c0;border-radius:8px;padding:9px 12px}
.result-box.ph{border-color:#c8b8f0}
.result-box-label{font-size:10px;color:var(--green);font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.result-box-label.ph{color:var(--purple)}
.result-box-value{font-family:var(--mono);font-size:21px;font-weight:600;color:var(--text);line-height:1.1}
.result-box-unit{font-size:11px;color:var(--text-dim);margin-top:1px}
.result-formula{background:rgba(0,0,0,.03);border:1px solid #c0dcc8;border-radius:7px;padding:10px 12px;font-family:var(--mono);font-size:12px;color:var(--text-mid);line-height:1.9}
.result-formula .hi{color:var(--blue);font-weight:600}

/* pH bar */
.ph-val-big{font-family:var(--mono);font-size:42px;font-weight:700;line-height:1;margin-bottom:7px}
.ph-scale{height:11px;border-radius:5px;background:linear-gradient(to right,#e74c3c 0%,#e67e22 15%,#f1c40f 28%,#2ecc71 50%,#3498db 68%,#9b59b6 85%,#8e44ad 100%);position:relative;margin-bottom:3px}
.ph-marker{position:absolute;top:-4px;width:3px;height:19px;background:#1a1a2e;border-radius:2px;transform:translateX(-50%)}
.ph-scale-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--text-dim);font-family:var(--mono)}
.ph-nature{font-size:12px;font-weight:600;color:var(--purple);margin-top:5px}

/* Conv table */
.conv-table{width:100%;border-collapse:collapse}
.conv-table tr{border-bottom:1px solid var(--border)}
.conv-table tr:last-child{border-bottom:none}
.conv-table td{padding:5px 2px;font-size:12px}
.conv-table td:first-child{color:var(--text-dim);font-family:var(--mono);font-size:11px;width:110px}
.conv-table td:last-child{font-family:var(--mono);font-weight:600;color:var(--text);text-align:right}

/* SDS */
.sds-card{background:#fffbf5;border:1px solid #e8d8c0;border-radius:var(--radius);padding:14px;margin-bottom:12px}
.sds-title{font-size:11px;font-weight:700;color:#8a4e00;text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px}
.sds-ghs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
.ghs-badge{display:flex;align-items:center;gap:3px;background:var(--white);border:1px solid #e8d8c0;border-radius:20px;padding:2px 9px;font-size:11px;color:var(--text-mid)}
.sds-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:7px}
@media(max-width:480px){.sds-grid{grid-template-columns:1fr}}
.sds-blk{background:var(--white);border:1px solid #e8d8c0;border-radius:7px;padding:8px 10px}
.sds-blk-title{font-size:10px;font-weight:700;color:#8a4e00;text-transform:uppercase;margin-bottom:3px}
.sds-blk-body{font-size:11px;color:var(--text-mid);line-height:1.5}
.sds-blk-body ul{padding-left:13px;margin:0}
.sds-blk-body li{margin-bottom:1px}
.sds-note{font-size:10px;color:var(--text-dim);border-top:1px solid #e8d8c0;padding-top:6px;margin-top:3px;font-style:italic}

/* Alerts */
.alerts{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.alert{display:flex;gap:6px;font-size:12px;border-radius:7px;padding:7px 11px;align-items:flex-start}
.alert.warn{background:var(--orange-light);border:1px solid #f0c090;color:var(--orange)}
.alert.danger{background:var(--red-light);border:1px solid #f0b0b8;color:var(--red)}

/* Buttons */
.btn-row{display:flex;gap:7px;margin-top:10px}
.btn{flex:1;padding:10px;border-radius:8px;border:none;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-ghost{background:var(--bg);color:var(--text-dim);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--border-mid)}

/* Empty */
.empty{text-align:center;padding:32px 16px;color:var(--text-dim);background:var(--white);border:1px dashed var(--border-mid);border-radius:var(--radius)}
.empty-icon{font-size:32px;margin-bottom:8px}
.empty-text{font-size:12px;line-height:1.7}

@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:2px}
.panel{display:none}.panel.active{display:block}

@media(max-width:500px){
  .ptable{gap:1px}
  .el-btn{font-size:8px}
  .el-num{font-size:6px}
}
</style>
</head>
<body>
<div class="wrap">

<!-- Header -->
<div class="hdr">
  <div class="hdr-icon">⚗️</div>
  <div><div class="hdr-title">試薬計算アプリ</div><div class="hdr-sub">元素フィルタ · 完全オフライン</div></div>
  <div class="offline-badge">✅ オフライン</div>
</div>

<!-- Mode tabs -->
<div class="tabs">
  <button class="tab active" onclick="setMode('liquid')">💧 液体<br>希釈</button>
  <button class="tab" onclick="setMode('solid')">🧪 固体<br>溶解</button>
  <button class="tab" onclick="setMode('ph')">⚗️ pH<br>計算</button>
  <button class="tab" onclick="setMode('conv')">🔄 単位<br>変換</button>
</div>

<!-- ══ 液体希釈 ══ -->
<div class="panel active" id="panel-liquid">
  <div id="ef-liquid" class="element-filter"></div>
  <div class="card">
    <div class="card-title">💧 液体希釈（C₁V₁ = C₂V₂）</div>
    <div class="reagent-select-area">
      <div class="reagent-count" id="l-count">試薬を選んでください</div>
      <select class="reagent-main" id="l-reagent" onchange="onReagentSelect('l')"><option value="">── 試薬を選択 ──</option></select>
      <div class="reagent-info-box" id="l-info"></div>
    </div>
    <div class="field-row col2u">
      <div><label>原液濃度 C₁</label><input type="number" id="l-c1" placeholder="1000" min="0" oninput="calcLiquid()"></div>
      <div><label>単位</label><select class="unit-sel" id="l-c1u" onchange="calcLiquid()"><option>ppm</option><option>ppb</option><option>mg/L</option><option>g/L</option><option>mol/L</option><option>wt%</option></select></div>
    </div>
    <div class="field-row col2u">
      <div><label>目標濃度 C₂</label><input type="number" id="l-c2" placeholder="100" min="0" oninput="calcLiquid()"></div>
      <div><label>単位</label><select class="unit-sel" id="l-c2u" onchange="calcLiquid()"><option>ppm</option><option>ppb</option><option>mg/L</option><option>g/L</option><option>mol/L</option><option>wt%</option></select></div>
    </div>
    <div class="field-row col2u">
      <div><label>最終体積 V₂</label><input type="number" id="l-v2" placeholder="1000" min="0" oninput="calcLiquid()"></div>
      <div><label>単位</label><select class="unit-sel" id="l-v2u" onchange="calcLiquid()"><option>mL</option><option>L</option><option>μL</option></select></div>
    </div>
    <div class="field-row col2">
      <div><label>純度 <span class="opt">%（任意）</span></label><input type="number" id="l-purity" placeholder="100" min="0" max="100" oninput="calcLiquid()"></div>
    </div>
  </div>
  <div id="l-alerts"></div>
  <div id="l-result"><div class="empty"><div class="empty-icon">💧</div><div class="empty-text">値を入力すると自動計算されます</div></div></div>
  <div id="l-sds"></div>
  <div class="btn-row"><button class="btn btn-ghost" onclick="clearPanel('liquid')">クリア</button></div>
</div>

<!-- ══ 固体溶解 ══ -->
<div class="panel" id="panel-solid">
  <div id="ef-solid" class="element-filter"></div>
  <div class="card">
    <div class="card-title">🧪 固体溶解</div>
    <div class="reagent-select-area">
      <div class="reagent-count" id="s-count">試薬を選んでください</div>
      <select class="reagent-main" id="s-reagent" onchange="onReagentSelect('s')"><option value="">── 試薬を選択 ──</option></select>
      <div class="reagent-info-box" id="s-info"></div>
    </div>
    <div class="field-row col2u">
      <div><label>目標濃度</label><input type="number" id="s-conc" placeholder="500" min="0" oninput="calcSolid()"></div>
      <div><label>単位</label><select class="unit-sel" id="s-concu" onchange="onSolidUnitChange()"><option>ppm</option><option>ppb</option><option>mg/L</option><option>g/L</option><option>mol/L</option><option>wt%</option></select></div>
    </div>
    <div class="field-row col2u">
      <div><label>最終体積</label><input type="number" id="s-vol" placeholder="500" min="0" oninput="calcSolid()"></div>
      <div><label>単位</label><select class="unit-sel" id="s-volu" onchange="calcSolid()"><option>mL</option><option>L</option><option>μL</option></select></div>
    </div>
    <div class="field-row col2" id="s-mw-row" style="display:none">
      <div><label>分子量 MW <span class="opt">g/mol</span></label><input type="number" id="s-mw" placeholder="58.44" min="0" oninput="calcSolid()"></div>
      <div><label>密度 <span class="opt">g/mL</span></label><input type="number" id="s-density" placeholder="1.0" min="0" oninput="calcSolid()"></div>
    </div>
    <div class="field-row col2">
      <div><label>純度 <span class="opt">%（任意）</span></label><input type="number" id="s-purity" placeholder="100" min="0" max="100" oninput="calcSolid()"></div>
    </div>
  </div>
  <div id="s-alerts"></div>
  <div id="s-result"><div class="empty"><div class="empty-icon">🧪</div><div class="empty-text">値を入力すると自動計算されます</div></div></div>
  <div id="s-sds"></div>
  <div class="btn-row"><button class="btn btn-ghost" onclick="clearPanel('solid')">クリア</button></div>
</div>

<!-- ══ pH計算 ══ -->
<div class="panel" id="panel-ph">
  <div class="card">
    <div class="card-title">⚗️ pH計算</div>
    <div class="field-row">
      <div><label>酸・塩基・緩衝液の種類</label>
        <select class="unit-sel" id="ph-type" onchange="onPhTypeChange()">
          <optgroup label="強酸">
            <option value="strong_acid">強酸（HCl、HNO₃、H₂SO₄ など）</option>
            <option value="strong_acid_hcl">HCl（塩酸）</option>
            <option value="strong_acid_hno3">HNO₃（硝酸）</option>
            <option value="strong_acid_hclo4">HClO₄（過塩素酸）</option>
            <option value="strong_acid_hbr">HBr（臭化水素酸）</option>
            <option value="strong_acid_hi">HI（ヨウ化水素酸）</option>
          </optgroup>
          <optgroup label="強塩基">
            <option value="strong_base">強塩基（NaOH、KOH など）</option>
            <option value="strong_base_naoh">NaOH（水酸化ナトリウム）</option>
            <option value="strong_base_koh">KOH（水酸化カリウム）</option>
            <option value="strong_base_lioh">LiOH（水酸化リチウム）</option>
            <option value="strong_base_baoh2">Ba(OH)₂（水酸化バリウム）</option>
          </optgroup>
          <optgroup label="弱酸 — カルボン酸">
            <option value="weak_acid" data-pka="4.76">酢酸 CH₃COOH（pKa=4.76）</option>
            <option value="weak_acid" data-pka="3.75">ギ酸 HCOOH（pKa=3.75）</option>
            <option value="weak_acid" data-pka="4.19">乳酸（pKa=4.19）</option>
            <option value="weak_acid" data-pka="3.86">マレイン酸 第1解離（pKa=3.86）</option>
            <option value="weak_acid" data-pka="5.10">マレイン酸 第2解離（pKa=5.10）</option>
            <option value="weak_acid" data-pka="4.21">コハク酸 第1解離（pKa=4.21）</option>
            <option value="weak_acid" data-pka="5.64">コハク酸 第2解離（pKa=5.64）</option>
            <option value="weak_acid" data-pka="2.98">マロン酸 第1解離（pKa=2.98）</option>
            <option value="weak_acid" data-pka="5.68">マロン酸 第2解離（pKa=5.68）</option>
            <option value="weak_acid" data-pka="3.13">クエン酸 第1解離（pKa=3.13）</option>
            <option value="weak_acid" data-pka="4.76">クエン酸 第2解離（pKa=4.76）</option>
            <option value="weak_acid" data-pka="6.40">クエン酸 第3解離（pKa=6.40）</option>
            <option value="weak_acid" data-pka="2.99">酒石酸 第1解離（pKa=2.99）</option>
            <option value="weak_acid" data-pka="4.34">酒石酸 第2解離（pKa=4.34）</option>

const REAGENT_ELEMENTS = new Set();
REAGENTS.forEach(r => r.els.forEach(e => { if(ELEMENTS_MAP[e]) REAGENT_ELEMENTS.add(e); }));

// ═══════════════════════════════════════════════════════════════
// 周期表レンダリング
// ═══════════════════════════════════════════════════════════════
function buildPeriodicTable(containerId, prefix) {
  const container = document.getElementById(containerId);
  const selElements = new Set();

  const header = document.createElement('div');
  header.className = 'ef-header';
  header.innerHTML = `
    <div class="ef-title">🧬 元素フィルタ（クリックで絞込み）</div>
    <div class="ef-selected" id="${prefix}-ef-sel">すべての試薬を表示中（${REAGENTS.length}種）</div>
    <button class="ef-clear" onclick="clearElements('${prefix}')">クリア</button>
  `;
  container.appendChild(header);

  // Grid
  const grid = document.createElement('div');
  grid.className = 'ptable';

  // Build 7-row × 18-col grid
  const cells = Array.from({length: 9}, () => Array(18).fill(null));

  Object.entries(ELEMENTS_MAP).forEach(([sym, d]) => {
    if (d.row <= 9 && d.col <= 18) {
      cells[d.row - 1][d.col - 1] = {sym, ...d};
    }
  });

  // Add separator visual in row 7 (empty spacer before lanthanides)
  // rows 7,8 = lanthanide/actinide rows
  cells.forEach((row, ri) => {
    row.forEach((cell, ci) => {
      const btn = document.createElement('button');
      if (!cell) {
        btn.className = 'el-btn empty-cell';
        btn.innerHTML = '&nbsp;';
      } else {
        const hasR = REAGENT_ELEMENTS.has(cell.sym);
        btn.className = `el-btn cat-${cell.cat}${hasR ? ' has-reagent' : ''}`;
        btn.title = `${cell.sym} (${cell.z})`;
        btn.dataset.sym = cell.sym;
        btn.innerHTML = `<span class="el-num">${cell.z}</span>${cell.sym}`;
        btn.onclick = () => toggleElement(cell.sym, btn, prefix, selElements);
      }
      grid.appendChild(btn);
    });
  });

  container.appendChild(grid);

  // Legend
  const legend = document.createElement('div');
  legend.className = 'ef-legend';
  const cats = [
    {cls:'cat-alkali',label:'アルカリ金属'},
    {cls:'cat-alkali-earth',label:'アルカリ土類'},
    {cls:'cat-transition',label:'遷移金属'},
    {cls:'cat-halogen',label:'ハロゲン'},
    {cls:'cat-nonmetal',label:'非金属'},
    {cls:'cat-metalloid',label:'半金属'},
  ];
  cats.forEach(c => {
    const item = document.createElement('div');
    item.className = 'ef-legend-item';
    const sampleEl = document.querySelector(`.${c.cls}`);
    const bg = sampleEl ? getComputedStyle(sampleEl).backgroundColor : '#eee';
    item.innerHTML = `<div class="ef-legend-dot" style="background:${bg};border:1px solid #ccc"></div>${c.label}`;
    legend.appendChild(item);
  });
  container.appendChild(legend);

  // Store selElements on container
  container._selElements = selElements;
  container._prefix = prefix;
}

function toggleElement(sym, btn, prefix, selElements) {
  if (selElements.has(sym)) {
    selElements.delete(sym);
    const em = ELEMENTS_MAP[sym];
    btn.className = `el-btn cat-${em.cat}${REAGENT_ELEMENTS.has(sym) ? ' has-reagent' : ''}`;
  } else {
    selElements.add(sym);
    btn.className = btn.className + ' selected';
  }
  updateReagentDropdown(prefix, selElements);
}

function clearElements(prefix) {
  const container = document.getElementById(`ef-${prefix}`);
  container._selElements.clear();
  container.querySelectorAll('.el-btn.selected').forEach(b => {
    const sym = b.dataset.sym;
    if (sym) {
      const em = ELEMENTS_MAP[sym];
      b.className = `el-btn cat-${em.cat}${REAGENT_ELEMENTS.has(sym) ? ' has-reagent' : ''}`;
    }
  });
  updateReagentDropdown(prefix, new Set());
}

function updateReagentDropdown(prefix, selElements) {
  const sel = document.getElementById(`${prefix}-reagent`);
  const countEl = document.getElementById(`${prefix}-count`) || document.getElementById(`${prefix}-ef-sel`);
  const selLabel = document.getElementById(`${prefix}-ef-sel`);

  // Filter reagents
  let filtered;
  if (selElements.size === 0) {
    filtered = REAGENTS;
  } else {
    filtered = REAGENTS.filter(r =>
      [...selElements].every(e => r.els.includes(e))
    );
  }

  // Update dropdown
  const current = sel.value;
  sel.innerHTML = '<option value="">── 試薬を選択 ──</option>';

  // Priority reagent names for "よく使う試薬" group
  const PRIORITY_NAMES = [
    'H₂SO₄（硫酸 98%）', 'HNO₃（硝酸 60%）', 'HCl（塩酸 37%）', 'H₃PO₄（リン酸 85%）',
    'NaOH（水酸化ナトリウム）', 'KOH（水酸化カリウム）',
    'NaCl（塩化ナトリウム）', 'KCl（塩化カリウム）',
    'エタノール（C₂H₅OH 99.5%）', 'メタノール（CH₃OH）', 'アセトン（(CH₃)₂CO）',
    'H₂O₂（過酸化水素 30%）', '酢酸（CH₃COOH 純品）',
    'NaHCO₃（炭酸水素ナトリウム）', 'Na₂CO₃（炭酸ナトリウム 無水）',
    'NH₄Cl（塩化アンモニウム）', 'CaCl₂（塩化カルシウム 無水）',
    'MgCl₂·6H₂O（塩化マグネシウム六水和物）',
  ];
  
  // Add priority group at top
  const priorityItems = filtered
    .map((r, localIdx) => ({r, i: REAGENTS.indexOf(r)}))
    .filter(({r}) => PRIORITY_NAMES.includes(r.name));
  
  if (priorityItems.length > 0) {
    const og = document.createElement('optgroup');
    og.label = '⭐ よく使う試薬';
    // Sort by PRIORITY_NAMES order
    priorityItems.sort((a, b) => PRIORITY_NAMES.indexOf(a.r.name) - PRIORITY_NAMES.indexOf(b.r.name));
    priorityItems.forEach(({r, i}) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = r.name;
      og.appendChild(opt);
    });
    sel.appendChild(og);
  }

  // Group by category
  const groups = {};
  filtered.forEach((r, i) => {
    const globalIdx = REAGENTS.indexOf(r);
    if (!groups[r.cat]) groups[r.cat] = [];
    groups[r.cat].push({r, i: globalIdx});
  });

  // Priority order for common reagent categories
  const PRIORITY_CATS = ['無機酸', '無機塩基', '無機塩', '有機酸', '有機溶媒', '有機塩', '緩衝液試薬'];
  const sortedEntries = Object.entries(groups).sort(([a], [b]) => {
    const ai = PRIORITY_CATS.indexOf(a);
    const bi = PRIORITY_CATS.indexOf(b);
    if (ai >= 0 && bi >= 0) return ai - bi;
    if (ai >= 0) return -1;
    if (bi >= 0) return 1;
    return a.localeCompare(b, 'ja');
  });
  sortedEntries.forEach(([cat, items]) => {
    const og = document.createElement('optgroup');
    og.label = cat;
    items.forEach(({r, i}) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = r.name;
      og.appendChild(opt);
    });
    sel.appendChild(og);
  });

  // Restore selection if still valid
  if (current && filtered.find((r, idx) => REAGENTS.indexOf(r) === parseInt(current))) {
    sel.value = current;
  }

  // Update label
  const selArr = [...selElements];
  if (selLabel) {
    if (selArr.length === 0) {
      selLabel.textContent = `すべての試薬を表示中（${filtered.length}種）`;
    } else {
      selLabel.textContent = `${selArr.join('+')} を含む試薬：${filtered.length}種`;
    }
  }
  if (countEl && countEl !== selLabel) {
    countEl.innerHTML = `<span>${filtered.length}</span>種類の試薬が見つかりました`;
  }
}

// ═══════════════════════════════════════════════════════════════
// 試薬選択
// ═══════════════════════════════════════════════════════════════
function onReagentSelect(prefix) {
  const sel = document.getElementById(`${prefix}-reagent`);
  const infoBox = document.getElementById(`${prefix}-info`);
  const idx = sel.value;

  if (idx === '') {
    infoBox.style.display = 'none';
    removeSDS(prefix);
    return;
  }

  const r = REAGENTS[parseInt(idx)];
  let lines = [];
  lines.push(`MW = ${r.mw} g/mol`);
  if (r.formula) lines.push(`式: ${r.formula}`);
  if (r.hydrate) lines.push(`水和換算係数: ${fmt(r.mw/r.hydrate.baseMw, 4)}  (${r.hydrate.base} MW=${r.hydrate.baseMw})`);
  if (r.density) lines.push(`密度: ${r.density} g/mL`);
  if (r.cas) lines.push(`CAS: ${r.cas}`);

  infoBox.textContent = lines.join('　');
  infoBox.style.display = 'block';

  // 固体溶解タブならMWを自動入力
  if (prefix === 's') {
    document.getElementById('s-mw').value = r.mw;
    if (r.density) document.getElementById('s-density').value = r.density;
    calcSolid();
  }

  renderSDS(r, prefix);
}

function renderSDS(r, prefix) {
  removeSDS(prefix);
  const container = document.getElementById(`${prefix}-sds`);
  if (!container) return;

  let h = `<div class="sds-card"><div class="sds-title">🛡️ SDS — ${r.name}</div>`;
  if (r.cas) h += `<div style="font-size:11px;color:var(--text-dim);font-family:var(--mono);margin-bottom:7px">CAS: ${r.cas} ／ MW: ${r.mw} g/mol${r.density?` ／ 密度: ${r.density} g/mL`:''}</div>`;

  if (r.ghs?.length) {
    h += `<div class="sds-ghs">${r.ghs.map(g=>`<div class="ghs-badge"><span>${g.i}</span><span>${g.l}</span></div>`).join('')}</div>`;
  } else {
    h += `<div class="sds-ghs"><div class="ghs-badge"><span>✅</span><span>GHS分類なし（比較的安全）</span></div></div>`;
  }

  h += `<div class="sds-grid">`;
  if (r.haz?.length)  h += sdsBlk('⚠️ 危険有害性 (H文)', `<ul>${r.haz.map(x=>`<li>${x}</li>`).join('')}</ul>`);
  if (r.pre?.length)  h += sdsBlk('📋 注意書き (P文)', `<ul>${r.pre.map(x=>`<li>${x}</li>`).join('')}</ul>`);
  if (r.ppe?.length)  h += sdsBlk('🥽 保護具', `<ul>${r.ppe.map(x=>`<li>${x}</li>`).join('')}</ul>`);
  if (r.fa) {
    const fa = r.fa;
    const items = [fa.sk&&`皮膚: ${fa.sk}`, fa.ey&&`眼: ${fa.ey}`, fa['in']&&`吸入: ${fa['in']}`, fa.ig&&`飲込: ${fa.ig}`].filter(Boolean);
    if (items.length) h += sdsBlk('🏥 応急処置', `<ul>${items.map(x=>`<li>${x}</li>`).join('')}</ul>`);
  }
  if (r.stor||r.disp) h += sdsBlk('🗄️ 保管/廃棄', `${r.stor?`<b>保管:</b> ${r.stor}<br>`:''}${r.disp?`<b>廃棄:</b> ${r.disp}`:''}`);
  if (r.prep) h += sdsBlk('🔬 調製時の注意', r.prep);
  h += `</div></div>`;

  container.innerHTML = h;
}

function removeSDS(prefix) {
  const c = document.getElementById(`${prefix}-sds`);
  if (c) c.innerHTML = '';
}

function sdsBlk(t, b) {
  return `<div class="sds-blk"><div class="sds-blk-title">${t}</div><div class="sds-blk-body">${b}</div></div>`;
}

const MODES = ['liquid','solid','ph','conv'];
function setMode(m) {
  MODES.forEach(x => {
    document.getElementById('panel-'+x).classList.toggle('active', x===m);

}

function volToL(v,u){if(!v||isNaN(v))return null;if(u==='L')return v;if(u==='mL')return v/1000;if(u==='μL')return v/1e6;return v;}
function concToPpm(v,u,d=1.0){if(v===null||isNaN(v))return null;const dn=d||1;switch(u){case 'ppm':return v;case 'ppb':return v/1000;case 'ppt':return v/1e6;case 'mg/L':return v;case 'g/L':return v*1000;case 'μg/mL':return v;case 'ng/mL':return v/1000;case 'wt%':return v*1e4*dn;default:return v;}}
function fmt(n,sig=4){if(n===null||n===undefined||isNaN(n))return '—';if(n===0)return '0';if(Math.abs(n)>=0.001&&Math.abs(n)<1e7){const mag=Math.floor(Math.log10(Math.abs(n)));const dec=Math.max(0,sig-1-mag);return(+n.toFixed(dec)).toString();}return n.toExponential(sig-1);}
function smartVol(vL){if(vL<0.0001)return[vL*1e6,'μL'];if(vL<0.5)return[vL*1000,'mL'];return[vL,'L'];}
function mkAlerts(arr){return arr.length?`<div class="alerts">${arr.map(a=>`<div class="alert ${a.t}">${a.m}</div>`).join('')}</div>`:'';}
function empty(ico,txt='値を入力すると自動計算されます'){return `<div class="empty"><div class="empty-icon">${ico}</div><div class="empty-text">${txt}</div></div>`;}

// ─── 液体希釈 ───
function calcLiquid(){
  const c1=parseFloat(document.getElementById('l-c1').value);
  const c1u=document.getElementById('l-c1u').value;
  const c2=parseFloat(document.getElementById('l-c2').value);
  const c2u=document.getElementById('l-c2u').value;
  const v2=parseFloat(document.getElementById('l-v2').value);
  const v2u=document.getElementById('l-v2u').value;
  const pur=parseFloat(document.getElementById('l-purity').value)||100;
  const al=[];
  document.getElementById('l-alerts').innerHTML='';
  if(!c1||!c2||!v2){document.getElementById('l-result').innerHTML=empty('💧');return;}
  let c1p=c1u==='mol/L'?c1:concToPpm(c1,c1u);
  let c2p=c2u==='mol/L'?c2:concToPpm(c2,c2u);
  const v2L=volToL(v2,v2u);
  if(c2p>c1p){al.push({t:'danger',m:'🚫 目標濃度が原液濃度を超えています。希釈は不可能です。'});document.getElementById('l-alerts').innerHTML=mkAlerts(al);document.getElementById('l-result').innerHTML=empty('⚠️','入力値を確認してください');return;}
  const v1Li=(c2p*v2L)/c1p;
  const v1L=v1Li/(pur/100);
  const solL=v2L-v1L;
  const[v1d,v1u2]=smartVol(v1L);
  const[sld,slu]=smartVol(Math.max(0,solL));
  const ratio=Math.round(c1p/c2p);
  if(v1L*1000<0.1)al.push({t:'danger',m:'🚫 必要量が0.1mL未満。段階希釈を強く推奨します。'});
  else if(v1L*1000<1)al.push({t:'warn',m:'⚠️ 必要量が1mL未満。マイクロピペットを使用してください。'});
  document.getElementById('l-alerts').innerHTML=mkAlerts(al);
  document.getElementById('l-result').innerHTML=`
  <div class="result-card">
    <div class="result-grid">
      <div class="result-box"><div class="result-box-label">必要原液量 V₁</div><div class="result-box-value">${fmt(v1d)}</div><div class="result-box-unit">${v1u2}</div></div>
      <div class="result-box"><div class="result-box-label">追加溶媒量</div><div class="result-box-value">${solL<0?'—':fmt(sld)}</div><div class="result-box-unit">${solL<0?'エラー':slu}</div></div>
    </div>
    <div class="result-formula">C₁×V₁ = C₂×V₂ （×1/${ratio} 希釈）<br>${fmt(c1)}${c1u} × V₁ = ${fmt(c2)}${c2u} × ${fmt(v2)}${v2u}<br><span class="hi">→ V₁ = ${fmt(v1d)} ${v1u2}　溶媒 = ${solL<0?'—':fmt(sld)+' '+slu}</span>${pur<100?`<br><span style="color:var(--orange)">純度補正: ${fmt(v1Li*1000)}mL ÷ ${pur}% = ${fmt(v1L*1000)}mL</span>`:''}</div>
  </div>`;
}

// ─── 固体溶解 ───
function onSolidUnitChange(){
  const u=document.getElementById('s-concu').value;
  document.getElementById('s-mw-row').style.display=(u==='mol/L'||u==='wt%')?'':'none';
  calcSolid();
}

function calcSolid(){
  const conc=parseFloat(document.getElementById('s-conc').value);
  const cu=document.getElementById('s-concu').value;
  const vol=parseFloat(document.getElementById('s-vol').value);
  const vu=document.getElementById('s-volu').value;
  const mw=parseFloat(document.getElementById('s-mw').value);
  const pur=parseFloat(document.getElementById('s-purity').value)||100;
  const den=parseFloat(document.getElementById('s-density').value)||1.0;
  const al=[];
  if(!conc||!vol){document.getElementById('s-result').innerHTML=empty('🧪');return;}
  const volL=volToL(vol,vu);
  let massGi,massG,fHtml,gL;
  if(cu==='mol/L'){
    if(!mw){document.getElementById('s-result').innerHTML=empty('⚠️','mol/L計算には分子量が必要です');return;}
    massGi=conc*mw*volL;massG=massGi/(pur/100);gL=conc*mw;
    fHtml=`mol/L × MW × V(L) = ${fmt(conc)} × ${fmt(mw)} × ${fmt(volL)}<br><span class="hi">= ${fmt(massGi)} g（理論）${pur<100?` → 純度補正 ${fmt(massG)} g`:''}</span>`;
  } else if(cu==='wt%'){
    if(!mw){document.getElementById('s-result').innerHTML=empty('⚠️','wt%には分子量が必要です');return;}
    const vML=volL*1000;massGi=(conc/100)*den*vML;massG=massGi/(pur/100);gL=(conc/100)*den*1000;
    fHtml=`wt% × ρ × V(mL) / 100 = ${fmt(conc)} × ${fmt(den)} × ${fmt(vML)} / 100<br><span class="hi">= ${fmt(massGi)} g（理論）${pur<100?` → 純度補正 ${fmt(massG)} g`:''}</span>`;
  } else {
    let mgL;switch(cu){case 'ppm':mgL=conc;break;case 'ppb':mgL=conc/1000;break;case 'mg/L':mgL=conc;break;case 'g/L':mgL=conc*1000;break;default:mgL=conc;}
    massGi=mgL*volL/1000;massG=massGi/(pur/100);gL=mgL/1000;
    fHtml=`${fmt(mgL)} mg/L × ${fmt(volL)} L / 1000<br><span class="hi">= ${fmt(massGi)} g（理論）${pur<100?` → 純度補正 ${fmt(massG)} g`:''}</span>`;
  }

  // 水和物換算ノート
  const sIdx=document.getElementById('s-reagent').value;
  let hNote='';
  if(sIdx!==''){const r=REAGENTS[parseInt(sIdx)];if(r?.hydrate)hNote=`<br><span style="color:var(--purple);font-size:11px">※ 水和物換算済み（${r.hydrate.base} MW=${r.hydrate.baseMw} → MW=${r.mw}、係数: ${fmt(r.mw/r.hydrate.baseMw,4)}）</span>`;}

  const[md,mu]=massG<0.001?[massG*1e6,'μg']:massG<1?[massG*1000,'mg']:[massG,'g'];
  if(massG<0.00001)al.push({t:'danger',m:'🚫 必要量が極微量。段階希釈を使用してください。'});
  else if(massG<0.0001)al.push({t:'danger',m:'🚫 必要量 < 0.1mg。分析天秤（0.01mg精度）が必要です。'});
  else if(massG<0.001)al.push({t:'warn',m:'⚠️ 必要量 < 1mg。精密天秤（0.1mg精度）を使用してください。'});

  const cRows=[['g/L',fmt(gL)],['mg/L (ppm)',fmt(gL*1000)],['wt%',fmt(gL/(den*10))],['mol/L',mw?fmt(gL/mw):'—（MW必要）']];
  document.getElementById('s-alerts').innerHTML=mkAlerts(al);
  document.getElementById('s-result').innerHTML=`
  <div class="result-card">
    <div class="result-grid">
      <div class="result-box"><div class="result-box-label">必要試薬量</div><div class="result-box-value">${fmt(md)}</div><div class="result-box-unit">${mu}</div></div>
      <div class="result-box"><div class="result-box-label">溶媒でメスアップ</div><div class="result-box-value">${fmt(vol)}</div><div class="result-box-unit">${vu}</div></div>
    </div>
    <div class="result-formula">${fHtml}${hNote}</div>
    <div style="margin-top:10px"><div class="card-title">🔄 濃度換算</div><table class="conv-table">${cRows.map(([u,v])=>`<tr><td>${u}</td><td>${v}</td></tr>`).join('')}</table></div>
  </div>`;
}

// ─── pH計算 ───
function onPhTypeChange(){
  const type=document.getElementById('ph-type').value;
  const isBuf=type==='buffer'||type==='buffer_custom';
  const isCustom=type==='weak_acid_custom'||type==='weak_base_custom'||type==='buffer_custom';
  document.getElementById('ph-buffer-rows').style.display=isBuf?'':'none';
  document.getElementById('ph-conc-row').style.display=isBuf?'none':'';
  document.getElementById('ph-pka-row').style.display=isCustom?'':'none';
  if(!isCustom){const sel=document.getElementById('ph-type');const opt=sel.options[sel.selectedIndex];const pka=opt.dataset.pka||opt.dataset.pkb;if(pka)document.getElementById('ph-pka').value=pka;}
  // Update pKa/pKb label
  const lbl = document.getElementById('ph-pka-label');
  if(type.startsWith('weak_base')) lbl.textContent='pKb';
  else lbl.textContent='pKa';
  calcPh();
}

function calcPh(){
  const type=document.getElementById('ph-type').value;
  const isBuf=type==='buffer'||type==='buffer_custom';
  let ph,pOH,hConc,nature,fHtml,bufHtml='';

  if(isBuf){
    const tPh=parseFloat(document.getElementById('ph-target').value);
    const tC=parseFloat(document.getElementById('ph-total-conc').value);
    const vol=parseFloat(document.getElementById('ph-vol').value);
    const volu=document.getElementById('ph-volu').value;
    if(!tPh||!tC||!vol){document.getElementById('ph-result').innerHTML=empty('⚗️','目標pH・総濃度・体積を入力してください');return;}
    let pka;
    if(type==='buffer_custom'){pka=parseFloat(document.getElementById('ph-pka').value);if(!pka){document.getElementById('ph-result').innerHTML=empty('⚠️','pKaを入力してください');return;}}
    else{const sel=document.getElementById('ph-type');pka=parseFloat(sel.options[sel.selectedIndex].dataset.pka);}
    const ratio=Math.pow(10,tPh-pka);
    const cA=tC*ratio/(1+ratio);
    const cHA=tC/(1+ratio);
    const vL=volToL(vol,volu);
    ph=tPh;hConc=Math.pow(10,-ph);pOH=14-ph;nature=phNature(ph);
    fHtml=`Henderson-Hasselbalch: pH = pKa + log([A⁻]/[HA])<br>${fmt(tPh,3)} = ${fmt(pka,4)} + log([A⁻]/[HA])<br>[A⁻]/[HA] = ${fmt(ratio,4)}<br><span class="hi">[A⁻] = ${fmt(cA,4)} mol/L　[HA] = ${fmt(cHA,4)} mol/L</span>`;
    bufHtml=`<div style="margin-top:12px;padding:11px 12px;background:var(--purple-light);border:1px solid #c8b8f0;border-radius:8px"><div style="font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;margin-bottom:7px">🧫 緩衝液の組成（${vol}${volu}調製）</div><div style="font-size:13px;color:var(--text-mid);line-height:2">塩基型 [A⁻]: <strong style="font-family:var(--mono)">${fmt(cA*vL*1000,4)} mmol</strong><br>酸型 [HA]: <strong style="font-family:var(--mono)">${fmt(cHA*vL*1000,4)} mmol</strong><br><span style="font-size:11px;color:var(--text-dim)">※ 各試薬のg数は固体溶解タブで計算できます</span></div></div>`;
  } else {
    const conc=parseFloat(document.getElementById('ph-conc').value);
    const concu=document.getElementById('ph-concu').value;
    if(!conc){document.getElementById('ph-result').innerHTML=empty('⚗️','濃度を入力するとpHを計算します');return;}
    const cM=concu==='mmol/L'?conc/1000:conc;
    if(type==='strong_acid'||type.startsWith('strong_acid_')){hConc=cM;ph=-Math.log10(hConc);fHtml=`強酸: pH = -log[H⁺] = -log(${fmt(cM)})<br><span class="hi">pH = ${fmt(ph,4)}</span>`;}
    else if(type==='strong_base'||type.startsWith('strong_base_')){
      // Ba(OH)2 provides 2 OH- per formula unit
      const ohFactor = type==='strong_base_baoh2' ? 2 : 1;
      pOH=-Math.log10(cM*ohFactor);ph=14-pOH;hConc=Math.pow(10,-ph);
      fHtml=`強塩基: pOH = -log[OH⁻] = ${fmt(pOH,4)}<br>pH = 14 - pOH<br><span class="hi">pH = ${fmt(ph,4)}</span>`;
    }
    else if(type==='weak_acid'||type==='weak_acid_custom'){
      let pka=parseFloat(document.getElementById('ph-pka').value);
      if(!pka){document.getElementById('ph-result').innerHTML=empty('⚠️','pKaを入力してください');return;}
      ph=0.5*(pka-Math.log10(cM));hConc=Math.pow(10,-ph);fHtml=`弱酸: pH = (pKa − logC) / 2<br>= (${fmt(pka,4)} − log(${fmt(cM)})) / 2<br><span class="hi">pH = ${fmt(ph,4)}</span>`;
    } else if(type==='weak_base'||type==='weak_base_custom'){
      let pkb=parseFloat(document.getElementById('ph-pka').value);
      if(!pkb){document.getElementById('ph-result').innerHTML=empty('⚠️','pKbを入力してください');return;}
      pOH=0.5*(pkb-Math.log10(cM));ph=14-pOH;hConc=Math.pow(10,-ph);fHtml=`弱塩基: pOH = (pKb − logC) / 2 = ${fmt(pOH,4)}<br>pH = 14 − pOH<br><span class="hi">pH = ${fmt(ph,4)}</span>`;
    }
    nature=phNature(ph);
  }

  ph=Math.min(14,Math.max(0,ph||0));
  hConc=hConc||Math.pow(10,-ph);
  pOH=pOH||(14-ph);
  const ohConc=Math.pow(10,-pOH);
  const pct=Math.min(Math.max(ph/14*100,1),99).toFixed(1);
  const col=ph<3?'#e74c3c':ph<5?'#e67e22':ph<7?'#f0b429':ph<8?'#2ecc71':ph<11?'#3498db':'#9b59b6';

  document.getElementById('ph-result').innerHTML=`
  <div class="result-card ph-card">
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:10px">
      <div class="ph-val-big" style="color:${col}">${fmt(ph,4)}</div>
      <div style="flex:1;min-width:150px">
        <div class="ph-scale"><div class="ph-marker" style="left:${pct}%"></div></div>
        <div class="ph-scale-labels"><span>0</span><span>3</span><span>5</span><span>7</span><span>9</span><span>11</span><span>14</span></div>
        <div class="ph-nature">${nature}</div>
      </div>
    </div>
    <div class="result-grid">
      <div class="result-box ph"><div class="result-box-label ph">[H⁺]</div><div class="result-box-value" style="font-size:16px">${hConc.toExponential(3)}</div><div class="result-box-unit">mol/L</div></div>
      <div class="result-box ph"><div class="result-box-label ph">pOH / [OH⁻]</div><div class="result-box-value" style="font-size:16px">${fmt(pOH,4)}</div><div class="result-box-unit">${ohConc.toExponential(2)} mol/L</div></div>
    </div>
    <div class="result-formula">${fHtml}</div>
    ${bufHtml}
  </div>`;
}

function phNature(ph){if(!ph&&ph!==0)return '';if(ph<2)return '強酸性';if(ph<5)return '弱酸性';if(ph<6.5)return 'やや酸性';if(ph<7.5)return '中性';if(ph<9)return 'やや塩基性';if(ph<11)return '弱塩基性';return '強塩基性';}

// ─── 単位変換 ───
function calcConv(){
  const val=parseFloat(document.getElementById('cv-val').value);
  const unit=document.getElementById('cv-unit').value;
  const mw=parseFloat(document.getElementById('cv-mw').value);
  const den=parseFloat(document.getElementById('cv-density').value)||1.0;
  if(!val||isNaN(val)){document.getElementById('cv-result').innerHTML=empty('🔄');return;}
  let gL;
  if(unit==='mol/L'){if(!mw){document.getElementById('cv-result').innerHTML=empty('⚠️','mol/L変換には分子量が必要です');return;}gL=val*mw;}
  else{gL=concToPpm(val,unit,den)/1000;}
  const rows=[['ppm (mg/L)',fmt(gL*1000)],['ppb (μg/L)',fmt(gL*1e6)],['ppt (ng/L)',fmt(gL*1e9)],['mg/L',fmt(gL*1000)],['g/L',fmt(gL)],['μg/mL',fmt(gL*1000)],['ng/mL',fmt(gL*1e6)],['wt%',fmt(gL/(den*10))],['mol/L',mw?fmt(gL/mw):'—（MW必要）']];
  document.getElementById('cv-result').innerHTML=`
  <div class="result-card">
    <div class="card-title" style="margin-bottom:8px">🔄 変換結果（${fmt(val)} ${unit}）</div>
    <table class="conv-table">${rows.map(([u,v])=>`<tr><td>${u}</td><td>${v}</td></tr>`).join('')}</table>
    ${!mw?'<div style="font-size:11px;color:var(--text-dim);margin-top:7px">※ mol/L変換には分子量を入力してください</div>':''}
  </div>`;
}

// ─── Clear ───
function clearPanel(m){
  document.querySelectorAll(`#panel-${m} input`).forEach(e=>e.value='');
  ['l-reagent','s-reagent'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  ['l-info','s-info'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  removeSDS('l');removeSDS('s');
  const icons={liquid:'💧',solid:'🧪',ph:'⚗️',conv:'🔄'};
  const rids={liquid:'l-result',solid:'s-result',ph:'ph-result',conv:'cv-result'};
  const aids={liquid:'l-alerts',solid:'s-alerts'};
  if(rids[m])document.getElementById(rids[m]).innerHTML=empty(icons[m]);
  if(aids[m])document.getElementById(aids[m]).innerHTML='';
}
